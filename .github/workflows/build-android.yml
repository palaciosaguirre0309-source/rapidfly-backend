name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['app-operador/**', 'pwa-operador/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Instalar dependencias
        working-directory: app-operador
        run: npm install
      - name: Agregar Android
        working-directory: app-operador
        run: npx cap add android
      - name: Sincronizar
        working-directory: app-operador
        run: npx cap sync android
      - name: Compilar APK
        working-directory: app-operador/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: rapidfly-operador-v${{ github.run_number }}
          path: app-operador/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
