name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['app-operador/**', 'pwa-operador/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        working-directory: app-operador
        run: npm install

      - name: Agregar Android
        working-directory: app-operador
        run: npx cap add android

      - name: Sincronizar plugins nativos
        working-directory: app-operador
        run: npx cap sync android

      - name: Configurar permisos y servicios Android
        run: |
          MANIFEST="app-operador/android/app/src/main/AndroidManifest.xml"
          # Permisos necesarios para foreground service, vibración, wake lock y full screen
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SHORT_SERVICE"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT"/>\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>\n</manifest>|' "$MANIFEST"
          # Declarar PedidoService dentro de <application>
          sed -i 's|</application>|        <service android:name="digital.mundoia.rapidfly.operador.PedidoService" android:foregroundServiceType="shortService" android:exported="false"/>\n    </application>|' "$MANIFEST"
          echo "✅ Permisos y PedidoService configurados"

      - name: Inyectar plugin nativo RapiNotification y PedidoService
        run: |
          PKG_DIR="app-operador/android/app/src/main/java/digital/mundoia/rapidfly/operador"
          cp app-operador/android-patches/RapiNotification.java "$PKG_DIR/"
          cp app-operador/android-patches/MainActivity.java     "$PKG_DIR/"
          cp app-operador/android-patches/PedidoService.java    "$PKG_DIR/"
          echo "✅ Plugin RapiNotification + PedidoService inyectados en $PKG_DIR"

    
      - name: Reemplazar íconos con el logo RapiFly
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = Image.open("pwa-operador/icon-512.png").convert("RGBA")
          res = "app-operador/android/app/src/main/res"

          # Rojo RapiFly — mismo color que el fondo del logo
          BG = (192, 57, 43, 255)  # #C0392B

          configs = [
            ("mipmap-mdpi",    48,  108),
            ("mipmap-hdpi",    72,  162),
            ("mipmap-xhdpi",   96,  216),
            ("mipmap-xxhdpi",  144, 324),
            ("mipmap-xxxhdpi", 192, 432),
          ]

          for folder, legacy, fg in configs:
            os.makedirs(f"{res}/{folder}", exist_ok=True)

            # --- Íconos legacy (cuadrado y redondo) ---
            # Se muestran tal cual en Android < 8 y como fallback
            for name in ("ic_launcher.png", "ic_launcher_round.png"):
              src.resize((legacy, legacy), Image.LANCZOS).save(f"{res}/{folder}/{name}", "PNG")
              print(f"  ✅ {folder}/{name}  ({legacy}px)")

            # --- Foreground del adaptive icon ---
            # El logo ocupa el 60% del canvas; el resto es rojo de fondo.
            # Así cabe en la "zona segura" y no se recorta sin importar el launcher.
            logo_px = int(fg * 0.60)
            canvas  = Image.new("RGBA", (fg, fg), BG)
            logo    = src.resize((logo_px, logo_px), Image.LANCZOS)
            offset  = (fg - logo_px) // 2
            canvas.paste(logo, (offset, offset))
            canvas.save(f"{res}/{folder}/ic_launcher_foreground.png", "PNG")
            print(f"  ✅ {folder}/ic_launcher_foreground.png  "
                  f"(logo {logo_px}px centrado en canvas {fg}px)")

          print("\n✅ Todos los íconos RapiFly aplicados")
          PYEOF

          # Fondo rojo para el adaptive icon
          COLORS="app-operador/android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS" ]; then
            sed -i 's|<color name="ic_launcher_background">[^<]*</color>|<color name="ic_launcher_background">#C0392B</color>|' "$COLORS"
            echo "✅ Color de fondo #C0392B aplicado"
          fi

      - name: Compilar APK
        working-directory: app-operador/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: rapidfly-operador-v${{ github.run_number }}
          path: app-operador/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
