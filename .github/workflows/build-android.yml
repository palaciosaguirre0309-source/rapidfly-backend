name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['app-operador/**', 'pwa-operador/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        working-directory: app-operador
        run: npm install

      - name: Agregar Android
        working-directory: app-operador
        run: npx cap add android

      - name: Sincronizar plugins nativos
        working-directory: app-operador
        run: npx cap sync android

      - name: Agregar permiso pantalla completa
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT"/>\n</manifest>|' \
            app-operador/android/app/src/main/AndroidManifest.xml
          echo "✅ Permiso agregado"

      - name: Reemplazar íconos con el logo RapiFly
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = Image.open("pwa-operador/icon-512.png").convert("RGBA")
          res = "app-operador/android/app/src/main/res"

          # (carpeta, tamaño_legacy, tamaño_foreground_adaptive)
          configs = [
            ("mipmap-mdpi",    48,  108),
            ("mipmap-hdpi",    72,  162),
            ("mipmap-xhdpi",   96,  216),
            ("mipmap-xxhdpi",  144, 324),
            ("mipmap-xxxhdpi", 192, 432),
          ]

          for folder, legacy, fg in configs:
            for filename, size in [
              ("ic_launcher.png",            legacy),
              ("ic_launcher_round.png",      legacy),
              ("ic_launcher_foreground.png", fg),
            ]:
              path = f"{res}/{folder}/{filename}"
              os.makedirs(os.path.dirname(path), exist_ok=True)
              src.resize((size, size), Image.LANCZOS).save(path, "PNG")
              print(f"  ✅ {folder}/{filename} ({size}px)")

          print("Íconos aplicados correctamente")
          PYEOF

          # Fondo rojo para el adaptive icon
          COLORS="app-operador/android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS" ]; then
            sed -i 's|<color name="ic_launcher_background">[^<]*</color>|<color name="ic_launcher_background">#C0392B</color>|' "$COLORS"
            echo "✅ Fondo rojo aplicado al adaptive icon"
          fi

      - name: Compilar APK
        working-directory: app-operador/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: rapidfly-operador-v${{ github.run_number }}
          path: app-operador/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
